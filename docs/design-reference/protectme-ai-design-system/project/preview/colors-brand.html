<!doctype html>
<html class="theme-dark"><head><meta charset="utf-8">
<link rel="stylesheet" href="../tokens.css">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="card.css">
</head><body><div class="card">
  <div class="label" style="margin-bottom:14px;">Brand gradient — blue → indigo → violet (used sparingly)</div>
  <div style="height:80px;border-radius:16px;background:var(--gradient-brand);box-shadow:var(--glow-brand);display:flex;align-items:flex-end;padding:12px;box-sizing:border-box;">
    <span class="mono" style="color:#fff;font-size:11px;font-weight:600;">linear-gradient(135deg, #4D7CFE 0%, #6366F1 52%, #8B5CF6 100%)</span>
  </div>
  <div class="row" style="margin-top:12px;gap:8px;">
    <div class="swatch" style="background:#4D7CFE;flex:1;"><span class="name" style="color:#fff">blue</span><span class="hex" style="color:#fff">#4D7CFE</span></div>
    <div class="swatch" style="background:#6366F1;flex:1;"><span class="name" style="color:#fff">indigo</span><span class="hex" style="color:#fff">#6366F1</span></div>
    <div class="swatch" style="background:#8B5CF6;flex:1;"><span class="name" style="color:#fff">violet</span><span class="hex" style="color:#fff">#8B5CF6</span></div>
    <div class="swatch" style="background:#5B6EF5;flex:1;"><span class="name" style="color:#fff">solid</span><span class="hex" style="color:#fff">#5B6EF5</span></div>
    <div class="swatch" style="background:#EEF1FE;flex:1;border-color:rgba(0,0,0,.08)"><span class="name" style="color:#3F50C9">soft</span><span class="hex" style="color:#5B6EF5">#EEF1FE</span></div>
  </div>
</div></body></html>
