<!doctype html>
<html class="theme-dark"><head><meta charset="utf-8">
<link rel="stylesheet" href="../tokens.css">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="card.css">
<style>.r{display:flex;flex-direction:column;align-items:center;gap:6px;}
.r .box{width:74px;height:54px;background:var(--gradient-brand);border-top-left-radius:var(--rr);border-top-right-radius:var(--rr);}
.r .t{font:600 11px/1.2 var(--font-mono);color:#B7C2DC;text-align:center;}</style>
</head><body><div class="card">
  <div class="label" style="margin-bottom:16px;">Radii — generous &amp; soft</div>
  <div class="row" style="gap:10px;align-items:flex-end;">
    <div class="r" style="--rr:6px"><div class="box"></div><span class="t">xs<br>6</span></div>
    <div class="r" style="--rr:10px"><div class="box"></div><span class="t">sm<br>10</span></div>
    <div class="r" style="--rr:14px"><div class="box"></div><span class="t">md<br>14</span></div>
    <div class="r" style="--rr:18px"><div class="box"></div><span class="t">lg<br>18</span></div>
    <div class="r" style="--rr:24px"><div class="box"></div><span class="t">xl·card<br>24</span></div>
    <div class="r" style="--rr:32px"><div class="box"></div><span class="t">2xl<br>32</span></div>
    <div class="r"><div class="box" style="border-radius:999px 999px 0 0;"></div><span class="t">pill<br>999</span></div>
  </div>
</div></body></html>
