<!doctype html>
<html class="theme-dark"><head><meta charset="utf-8">
<link rel="stylesheet" href="../tokens.css">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="card.css">
<style>
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
  .stat{background:#fff;border:1px solid rgba(14,23,48,.08);border-radius:18px;padding:14px;box-shadow:var(--shadow-sm);}
  .stat .ico{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;}
  .stat .ico svg{width:18px;height:18px;}
  .stat .k{font:600 11px/1 var(--font-sans);letter-spacing:.04em;text-transform:uppercase;color:#818BA3;}
  .stat .v{font:700 22px/1.1 var(--font-sans);color:#0E1730;margin-top:6px;}
  .stat .s{font:500 12px var(--font-sans);margin-top:3px;}
</style>
</head><body><div class="card on-light">
  <div class="label on-light" style="margin-bottom:14px;">Summary stat cards</div>
  <div class="grid">
    <div class="stat"><div class="ico" style="background:#EEF1FE;color:#5B6EF5;"><i data-lucide="file-text"></i></div><div class="k">Contract type</div><div class="v" style="font-size:17px;">Rental lease</div></div>
    <div class="stat"><div class="ico" style="background:#FDECEC;color:#E5484D;"><i data-lucide="shield-alert"></i></div><div class="k">Overall risk</div><div class="v" style="color:#B42318;">High</div></div>
    <div class="stat"><div class="ico" style="background:#FEF3DC;color:#E8910C;"><i data-lucide="list-checks"></i></div><div class="k">Detected risks</div><div class="v">12</div><div class="s" style="color:#818BA3;">3 high · 5 med · 4 low</div></div>
    <div class="stat"><div class="ico" style="background:#E4F6EC;color:#1FA463;"><i data-lucide="message-square"></i></div><div class="k">Recommendation</div><div class="v" style="font-size:15px;line-height:1.3;">Ask 3 questions before signing</div></div>
  </div>
</div>
<script src="https://unpkg.com/lucide@latest"></script><script>lucide.createIcons();</script>
</body></html>
