<!doctype html>
<html class="theme-dark"><head><meta charset="utf-8">
<link rel="stylesheet" href="../tokens.css">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="card.css">
</head><body><div class="card">
  <div class="label" style="margin-bottom:14px;">Navy base scale — the dark canvas</div>
  <div class="row" style="gap:8px;">
    <div class="swatch" style="background:#070B16;flex:1;"><span class="name" style="color:#fff">950</span><span class="hex" style="color:#8593B0">#070B16</span></div>
    <div class="swatch" style="background:#0B1124;flex:1;"><span class="name" style="color:#fff">900 · base</span><span class="hex" style="color:#8593B0">#0B1124</span></div>
    <div class="swatch" style="background:#0F1730;flex:1;"><span class="name" style="color:#fff">850</span><span class="hex" style="color:#8593B0">#0F1730</span></div>
    <div class="swatch" style="background:#141E3B;flex:1;"><span class="name" style="color:#fff">800</span><span class="hex" style="color:#8593B0">#141E3B</span></div>
    <div class="swatch" style="background:#1E2A4F;flex:1;"><span class="name" style="color:#fff">700</span><span class="hex" style="color:#B7C2DC">#1E2A4F</span></div>
    <div class="swatch" style="background:#2A3A66;flex:1;"><span class="name" style="color:#fff">600</span><span class="hex" style="color:#B7C2DC">#2A3A66</span></div>
    <div class="swatch" style="background:#3B4D7A;flex:1;"><span class="name" style="color:#fff">500</span><span class="hex" style="color:#fff">#3B4D7A</span></div>
  </div>
  <div class="row" style="margin-top:12px;gap:8px;">
    <div class="swatch" style="background:#FFFFFF;flex:1;border-color:rgba(0,0,0,.1)"><span class="name" style="color:#0E1730">card · white</span><span class="hex" style="color:#818BA3">#FFFFFF</span></div>
    <div class="swatch" style="background:#F7F9FC;flex:1;border-color:rgba(0,0,0,.08)"><span class="name" style="color:#0E1730">card-soft</span><span class="hex" style="color:#818BA3">#F7F9FC</span></div>
    <div class="swatch" style="background:#EEF2F8;flex:1;border-color:rgba(0,0,0,.08)"><span class="name" style="color:#0E1730">muted</span><span class="hex" style="color:#818BA3">#EEF2F8</span></div>
  </div>
</div></body></html>
