<!doctype html>
<html class="theme-dark"><head><meta charset="utf-8">
<link rel="stylesheet" href="../tokens.css">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="card.css">
<style>.e{display:flex;flex-direction:column;align-items:center;gap:8px;}
.e .box{width:88px;height:56px;background:#fff;border-radius:14px;}
.e .t{font:600 11px/1.3 var(--font-mono);color:#818BA3;text-align:center;}</style>
</head><body><div class="card on-light">
  <div class="label on-light" style="margin-bottom:18px;">Elevation — soft, navy-tinted shadows</div>
  <div class="row" style="gap:14px;">
    <div class="e"><div class="box" style="box-shadow:var(--shadow-xs)"></div><span class="t">xs</span></div>
    <div class="e"><div class="box" style="box-shadow:var(--shadow-sm)"></div><span class="t">sm</span></div>
    <div class="e"><div class="box" style="box-shadow:var(--shadow-md)"></div><span class="t">md</span></div>
    <div class="e"><div class="box" style="box-shadow:var(--shadow-card)"></div><span class="t">card</span></div>
    <div class="e"><div class="box" style="box-shadow:var(--shadow-lg)"></div><span class="t">lg</span></div>
    <div class="e"><div class="box" style="box-shadow:var(--shadow-xl)"></div><span class="t">xl</span></div>
  </div>
  <div class="e" style="margin-top:18px;align-items:flex-start;">
    <div class="box" style="width:120px;background:var(--gradient-brand);box-shadow:var(--glow-brand)"></div>
    <span class="t">glow-brand · reserved for primary CTA &amp; voice circle</span>
  </div>
</div></body></html>
