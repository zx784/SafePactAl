<!doctype html>
<html class="theme-dark"><head><meta charset="utf-8">
<link rel="stylesheet" href="../tokens.css">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="card.css">
</head><body><div class="card on-light">
  <div class="label on-light" style="margin-bottom:14px;">State colors — feedback &amp; text scale</div>
  <div class="row" style="gap:8px;">
    <div class="swatch" style="background:#1FA463;flex:1;min-height:54px;"><span class="name" style="color:#fff">Success</span><span class="hex" style="color:#fff">#1FA463</span></div>
    <div class="swatch" style="background:#E8910C;flex:1;min-height:54px;"><span class="name" style="color:#fff">Warning</span><span class="hex" style="color:#fff">#E8910C</span></div>
    <div class="swatch" style="background:#E5484D;flex:1;min-height:54px;"><span class="name" style="color:#fff">Error</span><span class="hex" style="color:#fff">#E5484D</span></div>
    <div class="swatch" style="background:#3D63E6;flex:1;min-height:54px;"><span class="name" style="color:#fff">Info</span><span class="hex" style="color:#fff">#3D63E6</span></div>
  </div>
  <div class="label on-light" style="margin:16px 0 8px;">Text on white card</div>
  <div class="col" style="gap:5px;">
    <span style="color:#0E1730;font:600 15px var(--font-sans)">Primary ink · #0E1730 — headings &amp; key copy</span>
    <span style="color:#4A5570;font:400 14px var(--font-sans)">Secondary · #4A5570 — body &amp; explanations</span>
    <span style="color:#818BA3;font:500 13px var(--font-sans)">Muted · #818BA3 — captions, meta, placeholders</span>
  </div>
  <div style="background:#0B1124;border-radius:10px;padding:10px 12px;margin-top:12px;">
    <span style="color:#F4F7FC;font:600 14px var(--font-sans)">On dark · #F4F7FC </span>
    <span style="color:#B7C2DC;font:400 13px var(--font-sans)">· secondary #B7C2DC </span>
    <span style="color:#7E8CAE;font:500 12px var(--font-sans)">· muted #7E8CAE</span>
  </div>
</div></body></html>
