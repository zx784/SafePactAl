<!doctype html>
<html class="theme-dark"><head><meta charset="utf-8">
<link rel="stylesheet" href="../tokens.css">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="card.css">
</head><body><div class="card">
  <div class="label" style="margin-bottom:14px;">Voice agent states — distinct hues from severity</div>
  <div class="row" style="gap:8px;">
    <div class="swatch" style="background:#8593B0;flex:1;min-height:60px;"><span class="name" style="color:#0E1730">Idle</span><span class="hex" style="color:#0E1730">#8593B0</span></div>
    <div class="swatch" style="background:#4D7CFE;flex:1;min-height:60px;"><span class="name" style="color:#fff">Listening</span><span class="hex" style="color:#fff">#4D7CFE</span></div>
    <div class="swatch" style="background:#8B5CF6;flex:1;min-height:60px;"><span class="name" style="color:#fff">Thinking</span><span class="hex" style="color:#fff">#8B5CF6</span></div>
    <div class="swatch" style="background:#22C7D6;flex:1;min-height:60px;"><span class="name" style="color:#0E1730">Speaking</span><span class="hex" style="color:#0E1730">#22C7D6</span></div>
  </div>
  <div class="row" style="margin-top:8px;gap:8px;">
    <div class="swatch" style="background:#E8910C;flex:1;min-height:60px;"><span class="name" style="color:#fff">Tool</span><span class="hex" style="color:#fff">#E8910C</span></div>
    <div class="swatch" style="background:#1FA463;flex:1;min-height:60px;"><span class="name" style="color:#fff">Draft ready</span><span class="hex" style="color:#fff">#1FA463</span></div>
    <div class="swatch" style="background:#7E8CAE;flex:1;min-height:60px;"><span class="name" style="color:#fff">Ended</span><span class="hex" style="color:#fff">#7E8CAE</span></div>
    <div class="swatch" style="background:#E5484D;flex:1;min-height:60px;"><span class="name" style="color:#fff">Error</span><span class="hex" style="color:#fff">#E5484D</span></div>
  </div>
</div></body></html>
